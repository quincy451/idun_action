MEMORY {
  ZP:   start = $0002, size = $001a, type = rw, define = yes;
  CODE: start = $1000, size = $EF00, file = %O, define = yes;
}
SEGMENTS {
  ZEROPAGE: load = ZP,   type = zp;
  CODE:     load = CODE, type = ro;
  RODATA:   load = CODE, type = ro;
  BSS:      load = CODE, type = bss, define = yes;
}
