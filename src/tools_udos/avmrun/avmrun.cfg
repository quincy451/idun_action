MEMORY {
  ZPSTACK:   start = $0002, size = $008E, define = yes;
  ZPTEMP:    start = $00E0, size = $001C, define = yes;
  BIN_HEADER:start = $0000, size = $FFFF, file = "build/udos_tools/avmrun_bin_header";
  ACHERON:   start = $0900, size = $4000, define = yes, file = %O;
  INCFILE:   start = $0000, size = $FFFFFF, file = "build/udos_tools/avmrun_acheron.inc";
  OPDESC:    start = $0000, size = $FFFFFF, file = "build/udos_tools/avmrun_opdesc";
}

SEGMENTS {
  STARTUP: load = ACHERON;
  DISPATCH: load = ACHERON, align = $0100;
  ACHERON:  load = ACHERON;
  CODE:     load = ACHERON;
  ZPSTACK:  load = ZPSTACK, type = zp;
  ZPTEMP:   load = ZPTEMP, type = zp;
  BIN_HEADER: load = BIN_HEADER;
  INCFILE_TOP: load = INCFILE;
  INCFILE_IMPORTS: load = INCFILE;
  INCFILE_PSEUDO: load = INCFILE;
  INCFILE_OPCODES: load = INCFILE;
  INCFILE_INSTRUCTIONS: load = INCFILE;
  INCFILE_BOTTOM: load = INCFILE;
  OPDESC_: load = OPDESC;
}
