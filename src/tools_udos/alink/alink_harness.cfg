MEMORY
{
  ZPTEMP:
    start  = $E0
    size   = $20
    define = yes;

  CODE:
    start  = $0900
    size   = $8F00
    file   = %O
    define = yes;

  WORKSPACE:
    start  = $A000
    size   = $2000
    define = yes;
}

SEGMENTS
{
  CODE: load = CODE;
  BSS:  load = WORKSPACE, type = bss, define = yes;

  ZPTEMP:
    load = ZPTEMP
    type = zp;
}
