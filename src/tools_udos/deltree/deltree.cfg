MEMORY
{
  ZPTEMP:
    start  = $E0
    size   = $20
    define = yes;

  CODE:
    start  = $0900
    size   = $2000
    file   = %O
    define = yes;

  BSS:
    start  = $1000
    size   = $0800
    define = yes;
}

SEGMENTS
{
  CODE: load = CODE;

  BSS:
    load = BSS
    type = bss;

  ZPTEMP:
    load = ZPTEMP
    type = zp;
}
